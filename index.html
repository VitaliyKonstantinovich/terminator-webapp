<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Терминатор — ИИ-ассистент</title>
  <meta name="description" content="Telegram Mini App — управление ИИ-ассистентом Терминатор">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- ═══ SCREEN 1 — START ═══ -->
    <div id="screen-start" class="screen active">
      <div class="screen-frame">
        <img src="assets/terminator_woman.webp" alt="" class="screen-bg" draggable="false">
        <div class="hero-fade"></div>
        <div class="start-ui">
          <h1 class="logo"><span class="t-metal">TER</span><span class="t-neon">MINA</span><span class="t-metal">TOR</span></h1>
          <p class="start-sub">Твой ИИ-ассистент для любых задач</p>
          <button class="btn-start" id="btn-start" type="button">▶&ensp;Старт</button>
        </div>
      </div>
    </div>

    <!-- ═══ SCREEN 2 — ВЫБОР РЕЖИМА ═══ -->
    <div id="screen-menu" class="screen">
      <div class="screen-frame">
        <img src="assets/bg_menu.webp" alt="" class="screen-bg" draggable="false">
        <div class="overlay-ui menu-ui">
          <h2 class="ui-title">Привет, Терминатор на связи!</h2>
          <p class="ui-sub">Выбери раздел:</p>
          <div class="menu-btns">
            <button class="menu-btn" id="btn-personal" type="button">
              <span class="mb-icon">👤</span><span class="mb-text">Личное</span><span class="mb-arrow">›</span>
            </button>
            <button class="menu-btn" id="btn-work" type="button">
              <span class="mb-icon">💼</span><span class="mb-text">Рабочее</span><span class="mb-arrow">›</span>
            </button>
            <button class="menu-btn" id="btn-other" type="button">
              <span class="mb-icon">🧩</span><span class="mb-text">Прочее</span><span class="mb-arrow">›</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ SCREEN 3 — ЛИЧНОЕ ═══ -->
    <div id="screen-personal" class="screen">
      <div class="screen-frame">
        <img src="assets/bg_personal.webp" alt="" class="screen-bg" draggable="false">
        <div class="overlay-ui personal-ui">
          <h2 class="ui-title">👤&ensp;Личное</h2>
          <p class="ui-sub">Выбери ИИ для ручной работы<br>через ПК Терминатора:</p>
          <div class="brain-grid">
            <button class="brain-card" data-brain="chatgpt" type="button">
              <div class="bc-icon"><img src="assets/icons/chatgpt.png" alt=""></div>
              <div class="bc-name">ChatGPT</div>
            </button>
            <button class="brain-card" data-brain="gemini" type="button">
              <div class="bc-icon"><img src="assets/icons/gemini.png" alt=""></div>
              <div class="bc-name">Gemini</div>
            </button>
            <button class="brain-card" data-brain="deepseek" type="button">
              <div class="bc-icon"><img src="assets/icons/deepseek.png" alt=""></div>
              <div class="bc-name">DeepSeek</div>
            </button>
            <button class="brain-card" data-brain="qwen" type="button">
              <div class="bc-icon"><img src="assets/icons/qwen.png" alt=""></div>
              <div class="bc-name">Qwen</div>
            </button>
          </div>
          <button class="btn-back" id="btn-back" type="button">←&ensp;Назад</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Status overlay -->
  <div id="status-overlay" class="status-overlay">
    <div class="spinner"></div>
    <div id="status-text" class="status-text">Подключение...</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
