<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Терминатор — ИИ-ассистент</title>
  <meta name="description" content="Telegram Mini App — управление ИИ-ассистентом Терминатор">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- ═══ Screen 1: Start ═══ -->
    <div id="screen-start" class="screen active">
      <div class="screen-wrapper">
        <img src="assets/terminator_woman.webp" alt="Терминатор" class="screen-bg">
        <div class="click-zone" id="btn-start"
             style="top:84%; left:38%; width:24%; height:9%;"></div>
      </div>
    </div>

    <!-- ═══ Screen 2: Main Menu ═══ -->
    <div id="screen-menu" class="screen">
      <div class="screen-wrapper">
        <img src="assets/bg_menu.webp" alt="Меню" class="screen-bg">
        <div class="click-zone" id="card-personal"
             style="top:41%; left:36%; width:28%; height:9%;"></div>
        <div class="click-zone" id="card-work"
             style="top:53%; left:36%; width:28%; height:9%;"></div>
        <div class="click-zone" id="card-other"
             style="top:65%; left:36%; width:28%; height:9%;"></div>
      </div>
    </div>

    <!-- ═══ Screen 3: Personal ═══ -->
    <div id="screen-personal" class="screen">
      <div class="screen-wrapper">
        <img src="assets/bg_personal.webp" alt="Личное" class="screen-bg">
        <div class="click-zone" id="brain-chatgpt" data-brain="chatgpt"
             style="top:36%; left:27%; width:21%; height:20%;"></div>
        <div class="click-zone" id="brain-gemini" data-brain="gemini"
             style="top:36%; left:52%; width:21%; height:20%;"></div>
        <div class="click-zone" id="brain-deepseek" data-brain="deepseek"
             style="top:58%; left:27%; width:21%; height:20%;"></div>
        <div class="click-zone" id="brain-qwen" data-brain="qwen"
             style="top:58%; left:52%; width:21%; height:20%;"></div>
        <div class="click-zone" id="btn-back-personal"
             style="top:80%; left:30%; width:40%; height:7%;"></div>
      </div>
    </div>

  </div>

  <!-- Status overlay -->
  <div id="status-overlay" class="status-overlay">
    <div class="spinner"></div>
    <div id="status-text" class="status-text">Подключение...</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
