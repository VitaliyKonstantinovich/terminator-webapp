<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Терминатор — ИИ-ассистент</title>
  <meta name="description" content="Telegram Mini App — управление ИИ-ассистентом Терминатор">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- ═══ SCREEN 1 — START ═══ -->
    <div id="screen-start" class="screen active">
      <div class="frame">
        <img src="assets/terminator_woman.webp" alt="" class="bg" draggable="false">
        <!-- Only the START button — text is on the image -->
        <button class="zone" id="btn-start"
          style="bottom:3%; left:50%; transform:translateX(-50%); width:180px; height:48px;">
        </button>
      </div>
    </div>

    <!-- ═══ SCREEN 2 — MENU ═══ -->
    <div id="screen-menu" class="screen">
      <div class="frame">
        <img src="assets/bg_menu.webp" alt="" class="bg" draggable="false">
        <!-- 3 buttons over image buttons -->
        <button class="zone" id="btn-personal"
          style="top:42%; left:50%; transform:translateX(-50%); width:300px; height:52px;">
        </button>
        <button class="zone" id="btn-work"
          style="top:54.5%; left:50%; transform:translateX(-50%); width:300px; height:52px;">
        </button>
        <button class="zone" id="btn-other"
          style="top:66.5%; left:50%; transform:translateX(-50%); width:300px; height:52px;">
        </button>
      </div>
    </div>

    <!-- ═══ SCREEN 3 — PERSONAL ═══ -->
    <div id="screen-personal" class="screen">
      <div class="frame">
        <img src="assets/bg_personal.webp" alt="" class="bg" draggable="false">
        <!-- 4 model cards + back -->
        <button class="zone" data-brain="chatgpt"
          style="top:34%; left:28%; width:20%; height:20%;">
        </button>
        <button class="zone" data-brain="gemini"
          style="top:34%; left:52%; width:20%; height:20%;">
        </button>
        <button class="zone" data-brain="deepseek"
          style="top:57%; left:28%; width:20%; height:20%;">
        </button>
        <button class="zone" data-brain="qwen"
          style="top:57%; left:52%; width:20%; height:20%;">
        </button>
        <button class="zone" id="btn-back"
          style="top:80%; left:50%; transform:translateX(-50%); width:300px; height:46px;">
        </button>
      </div>
    </div>

  </div>

  <!-- Status overlay -->
  <div id="status-overlay" class="status-overlay">
    <div class="spinner"></div>
    <div id="status-text" class="status-text">Подключение...</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
