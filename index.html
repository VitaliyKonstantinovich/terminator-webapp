<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Терминатор — ИИ-ассистент</title>
  <meta name="description" content="Telegram Mini App — управление ИИ-ассистентом Терминатор">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- ═══ Screen 1: Start ═══ -->
    <div id="screen-start" class="screen start-screen active">
      <div class="hero-image-wrapper">
        <img src="assets/terminator_woman.webp" alt="Терминатор" id="robot-img">
      </div>
      <div class="start-content">
        <button class="btn-start-overlay" id="btn-start">
          <span class="btn-icon">▶</span> СТАРТ
        </button>
      </div>
    </div>

    <!-- ═══ Screen 2: Main Menu ═══ -->
    <div id="screen-menu" class="screen img-screen">
      <img src="assets/bg_menu.webp" alt="Меню" class="screen-bg">
      <!-- Невидимые кликабельные зоны поверх кнопок на картинке -->
      <div class="click-zone" id="card-personal" style="top:40%; left:50%; transform:translateX(-50%); width:34%; height:11%;"></div>
      <div class="click-zone" id="card-work"     style="top:54%; left:50%; transform:translateX(-50%); width:34%; height:11%;"></div>
      <div class="click-zone" id="card-other"    style="top:68%; left:50%; transform:translateX(-50%); width:34%; height:11%;"></div>
    </div>

    <!-- ═══ Screen 3: Personal ═══ -->
    <div id="screen-personal" class="screen img-screen">
      <img src="assets/bg_personal.webp" alt="Личное" class="screen-bg">
      <!-- Невидимые кликабельные зоны поверх карточек на картинке -->
      <div class="click-zone" id="brain-chatgpt" data-brain="chatgpt" style="top:32%; left:30%; transform:translateX(-50%); width:20%; height:22%;"></div>
      <div class="click-zone" id="brain-gemini"  data-brain="gemini"  style="top:32%; left:70%; transform:translateX(-50%); width:20%; height:22%;"></div>
      <div class="click-zone" id="brain-deepseek" data-brain="deepseek" style="top:56%; left:30%; transform:translateX(-50%); width:20%; height:22%;"></div>
      <div class="click-zone" id="brain-qwen"    data-brain="qwen"    style="top:56%; left:70%; transform:translateX(-50%); width:20%; height:22%;"></div>
      <div class="click-zone" id="btn-back-personal" style="top:82%; left:50%; transform:translateX(-50%); width:40%; height:8%;"></div>
    </div>

  </div>

  <!-- Status overlay -->
  <div id="status-overlay" class="status-overlay">
    <div class="spinner"></div>
    <div id="status-text" class="status-text">Подключение...</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
