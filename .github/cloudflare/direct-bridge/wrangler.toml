name = "mina-direct-bridge"
main = "bridge-worker.js"
compatibility_date = "2026-05-05"

[[durable_objects.bindings]]
name = "COMMAND_QUEUE"
class_name = "CommandQueue"

[[durable_objects.bindings]]
name = "TASK_STORE"
class_name = "TaskStore"

[[migrations]]
tag = "v1-command-queue"
new_sqlite_classes = ["CommandQueue"]

[[migrations]]
tag = "v2-task-store"
new_sqlite_classes = ["TaskStore"]

[vars]
ALLOWED_ORIGIN = "https://vitaliykonstantinovich.github.io"
OWNER_SESSION_TTL_SECONDS = "900"
